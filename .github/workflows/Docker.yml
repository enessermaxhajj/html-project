name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: enessermaxhaj
          password: ${{secrets.DOCKER_HUB_TOKEN}}   
          
      - name: Build Docker image
        run: docker buildx build -t ${{ secrets.DOCKER}}enessermaxhaj/html-project:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}enessermaxhaj/html-project:latest

    